<!DOCTYPE html>

<meta charset="UTF-8">

<title>Carta</title>

<style>
body{
    margin:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#d8f3dc,#95d5b2);
    font-family:Georgia, serif;
}

.container{
    text-align:center;
}

button{
    padding:15px 30px;
    font-size:18px;
    border:none;
    border-radius:30px;
    background:#52b788;
    color:white;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:#40916c;
    transform:scale(1.05);
}

.carta{
    display:none;
    margin-top:30px;
    background:white;
    padding:30px;
    width:400px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    animation:aparecer 1s ease-in-out;
}

@keyframes aparecer{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}
.post{
    width:350px;
    background:white;
    border-radius:12px;
    overflow:hidden;
    margin:20px auto;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
}

.post-topo{
    display:flex;
    align-items:center;
    gap: 15px; /* aumenta o espaço */
    padding:10px;
}
.nome-usuario{
    font-size: 14px;
    font-weight: bold;
}
.foto-perfil{
     width:35px;
    height:35px;
    border-radius:50%;
    overflow:hidden;
}

.foto-perfil img{
    width:100%;
    height:100%;
    object-fit:cover;
}

.nome-usuario{
    font-size:13px;
    font-weight:bold;
}

.foto img{
    width:100%;
    height:490px;   /* ALTURA MAIOR */
    object-fit:cover;
}

.acoes{
    position: relative;
    display:flex;
    align-items:center;
    justify-content: space-between;
    padding: 10px;
}
.esquerda{
    display: flex;
    gap: 15px;
}

.butao-de-acao{
    display:flex;
    gap:15px;
}
.salvo{
    cursor: pointer;
}
.outras-fotos{
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 5px;
}
.outras-fotos span{
    width: 6px;
    height: 6px;
    background: #ccc;
    border-radius: 50%;
}
.direita{
    display: flex;
}
</style>
</head>
